name: Auto-merge and clean up branches

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Merge the pull request
        id: merge
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --merge \
            --repo "${{ github.repository }}"

      - name: Note why it wasn't merged
        if: steps.merge.outcome != 'success'
        run: |
          echo "PR #${{ github.event.pull_request.number }} could not be merged (conflicts, failing checks, or branch protection). Leaving it open, branch untouched."

      - name: Delete the source branch if it still exists
        if: >-
          steps.merge.outcome == 'success' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          if [ "$BRANCH" = "$DEFAULT_BRANCH" ]; then
            echo "Branch '$BRANCH' is the default branch, refusing to delete."
          else
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$BRANCH" \
              && echo "Branch '$BRANCH' deleted." \
              || echo "Branch '$BRANCH' already gone, nothing to delete."
          fi

      - name: Note fork branch left alone
        if: >-
          steps.merge.outcome == 'success' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Merged. Head branch is in a fork, leaving it alone."
