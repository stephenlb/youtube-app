name: Auto-merge and clean branches

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Check blacklist
        id: blacklist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BLACKLIST=(
            ".github/"
          )

          FILES=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --name-only)

          echo "Changed files:"
          echo "$FILES"

          for BLOCKED in "${BLACKLIST[@]}"; do
            if echo "$FILES" | grep -q "^$BLOCKED"; then
              echo "Blocked folder changed: $BLOCKED"
              echo "blocked=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "blocked=false" >> "$GITHUB_OUTPUT"

      - name: Close blocked PR
        if: steps.blacklist.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr close "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --comment "PR closed automatically: modifying protected folders is not allowed."

          exit 1

      - name: Merge pull request
        id: merge
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --merge \
            --repo "${{ github.repository }}"

      - name: Delete merged branch
        if: >-
          steps.merge.outcome == 'success' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          DEFAULT="${{ github.event.repository.default_branch }}"

          if [ "$BRANCH" = "$DEFAULT" ]; then
            echo "Cannot delete default branch."
            exit 0
          fi

          gh api \
            --method DELETE \
            "repos/${{ github.repository }}/git/refs/heads/$BRANCH" \
            && echo "Deleted branch: $BRANCH" \
            || echo "Branch already deleted."

      - name: Report fork branch
        if: >-
          steps.merge.outcome == 'success' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Merged successfully. Fork branch left untouched."            fi
          done

          echo "blocked=false" >> "$GITHUB_OUTPUT"

      - name: Close PR if blacklisted files changed
        if: steps.blacklist.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr close "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --comment "This PR was automatically closed because it modifies a protected folder."

          exit 1

      - name: Merge the pull request
        id: merge
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --merge \
            --repo "${{ github.repository }}"

      - name: Note why it wasn't merged
        if: steps.merge.outcome != 'success'
        run: |
          echo "PR could not be merged."

      - name: Delete source branch
        if: >-
          steps.merge.outcome == 'success' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          if [ "$BRANCH" != "$DEFAULT_BRANCH" ]; then
            gh api -X DELETE \
              "repos/${{ github.repository }}/git/refs/heads/$BRANCH" || true
          fi
