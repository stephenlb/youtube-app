<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Stream Test</title>

<style>
:root {
    color-scheme: dark;
    --radius: 16px;
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;

    font-family: Inter, "Segoe UI", Arial, sans-serif;
    color: white;

    overflow: hidden;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: url("background.jpg") center/cover no-repeat;
    filter: blur(10px);
    transform: scale(1.08);

    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;

    background: rgba(0,0,0,.1);

    z-index: -1;
}


h1 {
    margin: 0;

    padding: 8px 20px;

    font-size: clamp(1rem,2.5vw,1.8rem);

    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);

    background: rgba(0,0,0,.35);

    backdrop-filter: blur(12px);
}



/* Main video area */

#player-container {

    width: min(92vw, 1200px);
    height: min(75vh, 800px);

    display: flex;
    flex-direction: column;
    align-items: center;

    gap: 8px;
}



video {

    width: 100%;
    height: 100%;

    background: #000;

    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);

    object-fit: contain;

    box-shadow: 0 20px 50px rgba(0,0,0,.55);
}



/* Controls */

#custom-controls {

    width: 100%;
    flex-shrink: 0;

    height: 42px;
    max-height: 42px;

    display: flex;
    align-items: center;

    gap: 6px;

    padding: 5px 8px;

    background: rgba(0,0,0,.75);

    border-radius: var(--radius);

    backdrop-filter: blur(10px);
}



#custom-controls button {

    width: 32px;
    height: 32px;

    flex-shrink: 0;

    display: flex;
    justify-content: center;
    align-items: center;

    background: #111;

    color: white;

    border: 1px solid rgba(255,255,255,.2);

    border-radius: 8px;

    cursor: pointer;

    font-size: 14px;
}



#videoSeek {

    flex: 1;

    min-width: 30px;

    height: 4px;
}



#speedText {

    min-width: 28px;

    text-align: center;

    font-size: 12px;
}



#speedContainer {

    position: relative;

}



#speedMenu {

    display: none;

    position: absolute;

    right: 0;

    bottom: 40px;

    width: 120px;

    padding: 8px;

    background: #111;

    border: 1px solid rgba(255,255,255,.2);

    border-radius: 12px;

    box-shadow: 0 10px 30px rgba(0,0,0,.5);
}



#speedMenu input {

    width: 100%;

    height: 30px;

    background: #000;

    color: white;

    border: 1px solid rgba(255,255,255,.2);

    border-radius: 8px;

    padding: 5px;

}

</style>

</head>

<body>


<h1>Video Stream Test</h1>


<div id="player-container">

    <video id="player" autoplay></video>


    <div id="custom-controls">

        <button id="playButton">▶</button>


        <input id="videoSeek"
               type="range"
               min="0"
               value="0"
               step="0.1">


        <div id="speedContainer">

            <button id="speedButton">
                ◷
            </button>


            <div id="speedMenu">

                <input id="speedInput"
                       type="number"
                       min="0.1"
                       max="99"
                       step="0.1"
                       value="1">

            </div>

        </div>


        <span id="speedText">
            1x
        </span>


    </div>

</div>



<script>

const player = document.getElementById("player");
const seek = document.getElementById("videoSeek");

const playButton = document.getElementById("playButton");

const speedButton = document.getElementById("speedButton");
const speedMenu = document.getElementById("speedMenu");

const speedInput = document.getElementById("speedInput");
const speedText = document.getElementById("speedText");



(async()=>{

    const origin =
        window.location.protocol === "file:"
        ? "http://0.0.0.0:8000"
        : window.location.origin;


    try {

        const response =
            await fetch(`${origin}/video?query=Beep&limit=2`);


        const data =
            await response.json();


        player.src =
            `${origin}/stream?video_id=${encodeURIComponent(
                data.videos[0].id
            )}`;


    } catch(error) {

        console.error(error);

    }

})();



function togglePlay(){

    if(player.paused)
        player.play();

    else
        player.pause();

}


playButton.onclick = togglePlay;



player.addEventListener("play",()=>{
    playButton.textContent = "⏸";
});


player.addEventListener("pause",()=>{
    playButton.textContent = "▶";
});



player.addEventListener("loadedmetadata",()=>{

    seek.max = player.duration;

});



player.addEventListener("timeupdate",()=>{

    seek.value = player.currentTime;

});



seek.addEventListener("input",()=>{

    player.currentTime = seek.value;

});



speedButton.onclick = ()=>{

    speedMenu.style.display =
        speedMenu.style.display === "block"
        ? "none"
        : "block";

};



speedInput.addEventListener("input",()=>{

    let value = Number(speedInput.value);


    if(value < 0.1)
        value = 0.1;


    if(value > 99)
        value = 99;


    speedInput.value = value;

    player.playbackRate = value;

    speedText.textContent = value + "x";

});



document.addEventListener("keydown",(e)=>{

    if(e.code === "Space") {

        e.preventDefault();

        togglePlay();

    }


    if(e.key === "ArrowRight")
        player.currentTime += 10;


    if(e.key === "ArrowLeft")
        player.currentTime -= 10;

});

</script>


</body>
</html>
