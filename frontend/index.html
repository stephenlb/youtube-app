<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream Test</title>

<style>
:root {
    color-scheme: dark;
    --radius: 18px;
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
}

/* Blurred background */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("background.jpg") center/cover no-repeat;
    filter: blur(10px);
    transform: scale(1.08);
    z-index: -2;
}

/* Slight dark overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.1);
    z-index: -1;
}

h1 {
    margin: 0;
    padding: 12px 28px;
    font-size: 2rem;
    font-weight: 700;
    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    text-shadow: 0 2px 10px rgba(0,0,0,.6);
}

/* Auto-scale to fit the window */
video {
    display: block;
    width: auto;
    height: auto;
    max-width: calc(100vw - 48px);
    max-height: calc(100vh - 160px);
    object-fit: contain;

    /* Match the black bars to the video's black */
    background: #000;

    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,.55);
}
</style>
<script>
const player = document.getElementById("player");

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") {
        player.currentTime += 10;
    }

    if (e.key === "ArrowLeft") {
        player.currentTime -= 10;
    }
});
</script>
</head>
<body>

    <h1>Video Stream Test</h1>

    <video id="player" autoplay controls></video>

    <script>
        (async () => {
            const origin =
                window.location.protocol === "file:"
                    ? "http://0.0.0.0:8000"
                    : window.location.origin;

            const player = document.getElementById("player");

            try {
                const response = await fetch(`${origin}/video?query=Beep&limit=2`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const videos = await response.json();

                if (!videos.videos || videos.videos.length === 0) {
                    throw new Error("No videos found.");
                }

                const videoId = videos.videos[0].id;

                player.src = `${origin}/stream?video_id=${encodeURIComponent(videoId)}`;

                console.log("Origin:", origin);
                console.log(videos);
            } catch (err) {
                console.error(err);
                document.body.insertAdjacentHTML(
                    "beforeend",
                    `<p style="color:#ff8080">Error: ${err.message}</p>`
                );
            }
        })();
    </script>

</body>
</html>
