<h1>Video Stream Test</h1>
<video id=player autoplay=true controls=true></video>

<script>(async _ => {
    let origin = 'http://0.0.0.0:8000';
    let player = document.getElementById('player');
    let url = `${origin}/video?query=Beep&limit=2`;
    let response = await fetch(url);
    let videos = await response.json();
    let video_id = videos['videos'][0]['id'];

    let video_url = `${origin}/stream?video_id=${video_id}`;
    player.src = video_url;

    console.log(response);
    console.log(videos);
    console.log(video_id);
})();</script>
