<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Stream Test</title>

<style>
:root {
    color-scheme: dark;
    --radius: 18px;
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("background.jpg") center/cover no-repeat;
    filter: blur(10px);
    transform: scale(1.08);
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.1);
    z-index: -1;
}

h1 {
    margin: 0;
    padding: clamp(8px,2vw,14px) clamp(16px,4vw,28px);
    font-size: clamp(1.3rem,3vw,2rem);
    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(12px);
}

video {
    display: block;
    max-width: calc(100vw - 40px);
    max-height: calc(100vh - 190px);
    background: black;
    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);
    object-fit: contain;
    box-shadow: 0 20px 50px rgba(0,0,0,.55);
}

#custom-controls {
    width: min(90vw,900px);
    display: flex;
    align-items: center;
    gap: clamp(5px,1vw,12px);
    padding: clamp(8px,1.5vw,14px);
    background: rgba(0,0,0,.75);
    border-radius: var(--radius);
    backdrop-filter: blur(10px);
}

#custom-controls button {
    min-width: clamp(35px,5vw,50px);
    height: clamp(35px,5vw,50px);
    display: flex;
    justify-content: center;
    align-items: center;

    background:#111;
    color:white;
    border:1px solid rgba(255,255,255,.2);
    border-radius:12px;
    cursor:pointer;
    font-size:clamp(14px,2vw,20px);
}

#videoSeek {
    flex:1;
    min-width:50px;
}

#speedText {
    min-width:35px;
    text-align:center;
    font-size:clamp(12px,2vw,16px);
}

#speedButton {
    font-size:22px;
}
</style>
</head>

<body>

<h1>Video Stream Test</h1>

<video id="player" autoplay></video>

<div id="custom-controls">
    <button onclick="videoSkip(-10)">−10</button>
    <button onclick="videoToggle()">▶</button>
    <button onclick="videoSkip(10)">+10</button>

    <input id="videoSeek" type="range" min="0" value="0" step="0.1">

    <button id="speedButton" title="Playback speed">◷</button>
    <span id="speedText">1x</span>
</div>


<script>
const player = document.getElementById("player");
const seek = document.getElementById("videoSeek");
const speedButton = document.getElementById("speedButton");
const speedText = document.getElementById("speedText");


(async () => {
    const origin =
        window.location.protocol === "file:"
        ? "http://0.0.0.0:8000"
        : window.location.origin;

    try {
        const response = await fetch(`${origin}/video?query=Beep&limit=2`);

        if (!response.ok)
            throw new Error(`HTTP ${response.status}`);

        const videos = await response.json();

        if (!videos.videos?.length)
            throw new Error("No videos found");

        player.src =
            `${origin}/stream?video_id=${encodeURIComponent(videos.videos[0].id)}`;

    } catch(e) {
        console.error(e);
    }
})();


function videoSkip(seconds) {
    player.currentTime += seconds;
}

function videoToggle() {
    if(player.paused)
        player.play();
    else
        player.pause();
}


player.addEventListener("loadedmetadata",()=>{
    seek.max = player.duration;
});


player.addEventListener("timeupdate",()=>{
    seek.value = player.currentTime;
});


seek.addEventListener("input",()=>{
    player.currentTime = seek.value;
});


let speeds = [
    0.1,0.25,0.5,1,
    1.5,2,2.5,3,
    5,10,25,50,99
];

let speedIndex = 3;


speedButton.onclick = () => {
    speedIndex++;

    if(speedIndex >= speeds.length)
        speedIndex = 0;

    player.playbackRate = speeds[speedIndex];
    speedText.textContent = speeds[speedIndex] + "x";
};


document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowRight")
        videoSkip(10);

    if(e.key==="ArrowLeft")
        videoSkip(-10);

    if(e.code==="Space")
        videoToggle();

});
</script>

</body>
</html>
