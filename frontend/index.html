<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream Test</title>

    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Blurred background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("background.jpg") center/cover no-repeat;
            filter: blur(10px);
            transform: scale(1.05);
            z-index: -2;
        }

        /* Dark overlay */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: -1;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
        }

        video {
            width: min(90vw, 900px);
            max-height: 70vh;
            border-radius: 16px;
            background: #000;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <h1>Video Stream Test</h1>

    <video id="player" autoplay controls></video>

    <script>
        (async () => {
            const origin =
                window.location.protocol === "file:"
                    ? "http://0.0.0.0:8000"
                    : window.location.origin;

            const player = document.getElementById("player");

            try {
                const response = await fetch(`${origin}/video?query=Beep&limit=2`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const videos = await response.json();

                if (!videos.videos || videos.videos.length === 0) {
                    throw new Error("No videos found.");
                }

                const videoId = videos.videos[0].id;

                player.src = `${origin}/stream?video_id=${encodeURIComponent(videoId)}`;

                console.log("Origin:", origin);
                console.log(videos);
            } catch (err) {
                console.error(err);
                document.body.insertAdjacentHTML(
                    "beforeend",
                    `<p style="color:#ff8080">Error: ${err.message}</p>`
                );
            }
        })();
    </script>

</body>
</html>
