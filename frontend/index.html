<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Stream Test</title>

<style>
:root {
    color-scheme: dark;
    --radius: 18px;
}

* {
    box-sizing: border-box;
}

html, body {
    margin:0;
    width:100%;
    height:100%;
}

body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    font-family:Inter,"Segoe UI",Arial,sans-serif;
    color:white;
    overflow:hidden;
    position:relative;
}

body::before {
    content:"";
    position:fixed;
    inset:0;
    background:url("background.jpg") center/cover no-repeat;
    filter:blur(10px);
    transform:scale(1.08);
    z-index:-2;
}

body::after {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.1);
    z-index:-1;
}

h1 {
    margin:0;
    padding:clamp(8px,2vw,14px) clamp(16px,4vw,28px);
    font-size:clamp(1.2rem,3vw,2rem);
    border:2px solid rgba(255,255,255,.2);
    border-radius:var(--radius);
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(12px);
}

video {
    max-width:calc(100vw - 40px);
    max-height:calc(100vh - 160px);
    background:#000;
    border:2px solid rgba(255,255,255,.2);
    border-radius:var(--radius);
    object-fit:contain;
    box-shadow:0 20px 50px rgba(0,0,0,.55);
}


/* Dynamic compact controls */

#custom-controls {
    width:min(85vw,700px);
    height:clamp(42px,5vw,56px);

    display:flex;
    align-items:center;
    gap:clamp(4px,.8vw,10px);

    padding:clamp(5px,.8vw,10px);

    background:rgba(0,0,0,.75);
    border-radius:var(--radius);
    backdrop-filter:blur(10px);
}


#custom-controls button {
    width:clamp(28px,3vw,42px);
    height:clamp(28px,3vw,42px);

    padding:0;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#111;
    color:white;

    border:1px solid rgba(255,255,255,.2);
    border-radius:10px;

    cursor:pointer;
    font-size:clamp(12px,1.5vw,18px);
}


#videoSeek {
    flex:1;
    min-width:40px;
    height:clamp(3px,.5vw,7px);
}


#speedText {
    min-width:clamp(25px,4vw,40px);
    text-align:center;
    font-size:clamp(11px,1.3vw,15px);
}


#speedContainer {
    position:relative;
}


#speedMenu {
    display:none;

    position:absolute;
    right:0;
    bottom:calc(100% + 8px);

    width:clamp(100px,15vw,140px);

    padding:10px;

    background:#111;

    border:1px solid rgba(255,255,255,.2);
    border-radius:12px;

    box-shadow:0 10px 30px rgba(0,0,0,.5);
}


#speedMenu input {
    width:100%;
    height:clamp(28px,3vw,38px);

    background:#000;
    color:white;

    border:1px solid rgba(255,255,255,.2);
    border-radius:8px;

    padding:5px;

    font-size:clamp(12px,1.4vw,16px);
}

</style>
</head>


<body>


<h1>Video Stream Test</h1>


<video id="player" autoplay></video>


<div id="custom-controls">

    <button id="playButton">
        ▶
    </button>


    <input id="videoSeek"
           type="range"
           min="0"
           value="0"
           step="0.1">


    <div id="speedContainer">

        <button id="speedButton">
            ◷
        </button>


        <div id="speedMenu">

            <input id="speedInput"
                   type="number"
                   min="0.1"
                   max="99"
                   step="0.1"
                   value="1">

        </div>

    </div>


    <span id="speedText">
        1x
    </span>

</div>



<script>

const player = document.getElementById("player");

const seek = document.getElementById("videoSeek");

const playButton = document.getElementById("playButton");

const speedButton = document.getElementById("speedButton");

const speedMenu = document.getElementById("speedMenu");

const speedInput = document.getElementById("speedInput");

const speedText = document.getElementById("speedText");



(async()=>{

    const origin =
        window.location.protocol === "file:"
        ? "http://0.0.0.0:8000"
        : window.location.origin;


    try {

        const response =
            await fetch(`${origin}/video?query=Beep&limit=2`);


        const videos =
            await response.json();


        player.src =
            `${origin}/stream?video_id=${encodeURIComponent(
                videos.videos[0].id
            )}`;


    } catch(e){

        console.error(e);

    }

})();



function togglePlay(){

    if(player.paused)
        player.play();

    else
        player.pause();

}


playButton.onclick = togglePlay;



player.addEventListener("play",()=>{
    playButton.textContent="⏸";
});


player.addEventListener("pause",()=>{
    playButton.textContent="▶";
});



player.addEventListener("loadedmetadata",()=>{
    seek.max = player.duration;
});


player.addEventListener("timeupdate",()=>{
    seek.value = player.currentTime;
});


seek.addEventListener("input",()=>{
    player.currentTime = seek.value;
});



speedButton.onclick=()=>{

    speedMenu.style.display =
        speedMenu.style.display === "block"
        ? "none"
        : "block";

};



speedInput.addEventListener("input",()=>{

    let value = Number(speedInput.value);


    if(value < 0.1)
        value = 0.1;


    if(value > 99)
        value = 99;


    speedInput.value=value;

    player.playbackRate=value;

    speedText.textContent=value+"x";

});



document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){
        e.preventDefault();
        togglePlay();
    }


    if(e.key==="ArrowRight")
        player.currentTime += 10;


    if(e.key==="ArrowLeft")
        player.currentTime -= 10;

});

</script>


</body>
</html>
